[package]
name = "phoneme-rest"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "phoneme-rest"
path = "src/main.rs"

[dependencies]
phoneme-core = { path = "../../crates/phoneme-core" }
phoneme-ipc = { path = "../../crates/phoneme-ipc" }
anyhow.workspace = true
thiserror.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
async-trait.workspace = true
futures.workspace = true
chrono.workspace = true
axum = "0.8"
tower-http = { version = "0.6", features = ["trace"] }

[dev-dependencies]
tempfile.workspace = true
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"
# `test-util` (the tokio paused-clock used by the SSE keepalive test) is NOT in
# tokio's `full`, so the dep above doesn't provide it — pull it in for tests.
tokio = { workspace = true, features = ["test-util"] }
chrono.workspace = true
