name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Create dummy frontendDist for Tauri macro
        run: mkdir -p frontend/dist

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Production code must not panic via unwrap(). Without --all-targets this
      # skips test code (and #[cfg(test)] modules), where unwrap() is fine, so it
      # only flags unwrap() on a real runtime path. Use .expect("why it can't
      # fail") or propagate with ? instead.
      - name: Clippy (no unwrap() in production code)
        run: cargo clippy --workspace -- -D clippy::unwrap_used

      # Standing rule: CI must NEVER inject keystrokes/clipboard. The daemon
      # E2E tests spawn a real `phoneme-daemon` binary (not `cfg!(test)`), so
      # this env var is its only inject-guard — it inherits it from the runner
      # and `input_injection_disabled()` no-ops every type/paste/reconcile path.
      - name: Assert the inject-guard still gates the typing paths
        shell: bash
        run: |
          guard='bin/phoneme-daemon/src/in_place.rs'
          for fn in type_blocking reconcile_blocking paste_blocking; do
            if ! grep -A2 "fn ${fn}" "$guard" | grep -q 'input_injection_disabled()'; then
              echo "::error file=${guard}::${fn} no longer guards on input_injection_disabled() — real keystroke injection could leak"
              exit 1
            fi
          done
          echo "inject-guard intact: type/paste/reconcile all gated"

      - name: Test
        env:
          PHONEME_DISABLE_INPUT_INJECTION: "1"
        # Tests run in parallel: every test gets its own isolated catalog
        # (in-memory sqlite or a per-test tempdir), so there's no shared DB to
        # serialize on. KEEP the inject-guard env above — the daemon E2E tests
        # spawn a real binary that would otherwise type into the runner.
        run: cargo test --workspace

  docs:
    name: Rustdoc
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # src-tauri's build.rs needs a frontendDist dir to exist before the Tauri
      # macro will compile (and therefore doc), same as the rust job above.
      - name: Create dummy frontendDist for Tauri macro
        run: mkdir -p frontend/dist

      - name: Build docs (deny warnings)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps

  frontend:
    name: Frontend
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: frontend
        run: pnpm lint
      - name: Test
        working-directory: frontend
        run: pnpm exec vitest run

      - name: Type-check
        working-directory: frontend
        run: pnpm type-check

      - name: Build
        working-directory: frontend
        run: pnpm build

  tauri-build:
    name: Tauri build (debug)
    runs-on: windows-latest
    needs: [rust, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

      - name: Build workspace binaries
        run: cargo build --workspace

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build debug
        # Override createUpdaterArtifacts so CI doesn't need TAURI_SIGNING_PRIVATE_KEY.
        # Signing only happens in the release workflow where the secret is available.
        run: cargo tauri build --debug --config '{"bundle":{"createUpdaterArtifacts":false}}'

  deps-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    # Blocking gate: a new RUSTSEC or npm advisory fails CI. If a specific
    # advisory is known-unfixable (no patched upstream yet), scope it narrowly
    # on the offending step with `cargo audit --ignore RUSTSEC-XXXX-NNNN` (plus a
    # comment saying why) instead of muting the whole job with continue-on-error.
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        # Blocking: any RUSTSEC advisory fails the build. To allow a single
        # known-unfixable advisory through, add `--ignore RUSTSEC-XXXX-NNNN` here
        # with a comment explaining why it's safe — don't re-mute the whole step.
        run: cargo audit

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      # No pnpm cache here: this job only runs `pnpm audit` (no install), so the
      # store is empty and the cache-save post-step errored ("path does not
      # exist") — turning the whole advisory job red. The audit reads the
      # lockfile directly and doesn't need a warm cache.
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: pnpm audit (frontend)
        working-directory: frontend
        # Blocking: a new npm advisory fails the build. Narrow the scope with
        # `--audit-level high` or `pnpm audit --fix` rather than muting the step.
        run: pnpm audit
