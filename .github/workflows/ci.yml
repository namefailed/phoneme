name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Create dummy frontendDist for Tauri macro
        run: mkdir -p frontend/dist

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace -- --test-threads=1

  docs:
    name: Rustdoc
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # src-tauri's build.rs needs a frontendDist dir to exist before the Tauri
      # macro will compile (and therefore doc), same as the rust job above.
      - name: Create dummy frontendDist for Tauri macro
        run: mkdir -p frontend/dist

      - name: Build docs (deny warnings)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps

  frontend:
    name: Frontend
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: frontend
        run: pnpm lint
      - name: Test
        working-directory: frontend
        run: pnpm exec vitest run

      - name: Type-check
        working-directory: frontend
        run: pnpm type-check

      - name: Build
        working-directory: frontend
        run: pnpm build

  tauri-build:
    name: Tauri build (debug)
    runs-on: windows-latest
    needs: [rust, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

      - name: Build workspace binaries
        run: cargo build --workspace

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build debug
        # Override createUpdaterArtifacts so CI doesn't need TAURI_SIGNING_PRIVATE_KEY.
        # Signing only happens in the release workflow where the secret is available.
        run: cargo tauri build --debug --config '{"bundle":{"createUpdaterArtifacts":false}}'

  deps-audit:
    name: Dependency audit (advisory)
    runs-on: ubuntu-latest
    # Advisory only for now: surfaces RUSTSEC / npm advisories without blocking
    # merges (`continue-on-error`). Promote to a required gate on the core crates
    # once the known-noise advisories are triaged. (audit hygiene)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        # Advisory: report RUSTSEC advisories in the log but never fail the job,
        # so CI stays green while the backlog is triaged. Promote to a hard gate
        # (drop continue-on-error) once the core crates are clean.
        continue-on-error: true
        run: cargo audit

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      # No pnpm cache here: this job only runs `pnpm audit` (no install), so the
      # store is empty and the cache-save post-step errored ("path does not
      # exist") — turning the whole advisory job red. The audit reads the
      # lockfile directly and doesn't need a warm cache.
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: pnpm audit (frontend)
        working-directory: frontend
        continue-on-error: true
        run: pnpm audit
