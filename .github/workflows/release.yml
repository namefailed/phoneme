name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

      - name: Build workspace binaries
        run: cargo build --workspace --release

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build release MSI
        run: cargo tauri build -v
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_PRIVATE_KEY_PASSWORD }}

      - name: Build updater.json
        shell: pwsh
        run: |
          $msiDir = "target/release/bundle/msi"
          $sigFile = Get-ChildItem "$msiDir/*.sig" | Select-Object -First 1
          $zipFile = Get-ChildItem "$msiDir/*.zip" | Select-Object -First 1
          if (-not $sigFile) { throw "No .sig file found — was TAURI_SIGNING_PRIVATE_KEY set?" }
          if (-not $zipFile) { throw "No .zip file found — createUpdaterArtifacts may not be set" }
          $signature = (Get-Content $sigFile.FullName -Raw).Trim()
          $tag       = "${{ github.ref_name }}"
          $version   = $tag.TrimStart('v')
          $url       = "https://github.com/namefailed/phoneme/releases/download/$tag/$($zipFile.Name)"
          $json = [ordered]@{
            version  = $version
            notes    = ""
            pub_date = (Get-Date -AsUTC -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $signature
                url       = $url
              }
            }
          } | ConvertTo-Json -Depth 5
          $json | Set-Content "$msiDir/updater.json" -Encoding UTF8NoBOM
          Write-Output "updater.json written:"
          Write-Output $json

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/msi/*.msi
            target/release/bundle/msi/*.zip
            target/release/bundle/msi/*.sig
            target/release/bundle/msi/updater.json
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}
